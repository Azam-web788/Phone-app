<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone app</title>
    <style>
        body {
            color: white;
            background-color: rgb(26, 4, 4);
            font-family: Arial, Helvetica, sans-serif;
        }

        .parent {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .navbar-parent {
            background-color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .children {
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: none;
            font-weight: bold;
        }

        .children:hover {
            transition: 0.5s;
            color: blue;
            text-decoration: underline;
        }
        .buy{
            background-color: red;
            color: white;
            font-weight: bold;
            padding: 15px;
            border: 1px solid red;
            border-radius: 10px;
        }
        .buy:hover{
            background-color: green;
            border: 1px solid green;
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <div class="navbar-parent">
        <div>
            <img src="https://cdn-icons-png.flaticon.com/512/438/438560.png" alt="image" style="width: 100px;">
        </div>
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px;">
            <a href="#" class="children">Home</a>
            <a href="#" class="children">About</a>
            <a href="#" class="children">Service</a>
            <a href="#" class="children">Feedback</a>
        </div>
        <h1 style="color: black;">Quantity : <span class="quantity">0</span> </h1>
        <div class="cart">
            
        </div>
    </div>
    <br>
    <a href="index.html">
    <button style="background-color: gray;
            color: white;
            font-weight: bold;
            padding: 15px;
            border: 1px solid gray;
            border-radius: 10px;"><i class="fa-solid fa-arrow-left"></i>Go back</button>
            </a>
    <br>
    <h1 style="text-align: center;">Add to cart</h1>
    
    <div class="parent">

    </div>
    <h1>$ <span class="total">0</span></h1>
    <div class="disableButton">
    <button class="buy" onclick="Buy()">Place order</button>
    </div>
    <script src="https://kit.fontawesome.com/fe6eb3ed6d.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="cart.js"></script>
</body>
</html>
